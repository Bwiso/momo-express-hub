name: Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bwiso/momo-express-hub:latest
            bwiso/momo-express-hub:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_BUILD_COMMIT=${{ steps.meta.outputs.commit }}
            VITE_BUILD_TAG=${{ steps.meta.outputs.tag }}
            VITE_BUILD_BRANCH=${{ steps.meta.outputs.branch }}

      - name: Deploy to Linode server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            docker stop momo-express-hub || true
            docker rm momo-express-hub || true
            docker pull bwiso/momo-express-hub:latest
            docker run -d -p 80:80 --name momo-express-hub bwiso/momo-express-hub:latest
